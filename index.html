<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Señas OBS Pro — LSC Colombia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--surf:#111119;--bord:rgba(255,255,255,0.07);--acc:#7c6af7;--grn:#3ecf8e;--text:#f0f0f8;--mut:rgba(240,240,248,0.42);--S:#f5c9a0;--S2:#e8b080;--OT:#b87030;--SH:#2a3a8a;--HR:#2c1a0a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

body.overlay{background:transparent!important;}
body.overlay .ui-panel, body.overlay header{display:none!important;}
body.overlay .stage{grid-template-columns:1fr!important;}
body.overlay .wlabel{font-size:72px!important; text-shadow: 0 4px 15px rgba(0,0,0,0.8);}

.app{display:grid;grid-template-rows:auto 1fr;height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bord);background:var(--surf);}
.stage{display:grid;grid-template-columns:1fr 300px;height:100%;}

.display-area{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0b12;position:relative;}
.canvas-container{width:400px;height:400px;display:flex;align-items:center;justify-content:center;transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);}
svg{width:100%;height:100%;filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));}

.mode-avatar .canvas-container { transform: scale(1); }
.mode-hand .canvas-container { transform: scale(1.4) translateY(20px); }

.wlabel{margin-top:10px;font-size:48px;font-weight:700;letter-spacing:-2px;text-align:center;}
.mtag{font-size:11px;color:var(--acc);text-transform:uppercase;letter-spacing:2px;margin-bottom:15px;font-weight:700;}

.ui-panel{background:var(--surf);border-left:1px solid var(--bord);padding:20px;display:flex;flex-direction:column;gap:15px;}
.tbox{background:var(--bg);border:1px solid var(--bord);padding:15px;border-radius:10px;font-size:13px;height:150px;overflow-y:auto;color:var(--mut);line-height:1.6;}
.live{color:var(--grn);font-weight:700;}

button{width:100%;padding:12px;border-radius:8px;border:none;background:var(--acc);color:white;font-weight:700;cursor:pointer;transition:0.2s;}
button.sec{background:rgba(255,255,255,0.05);border:1px solid var(--bord);margin-top:5px;}

.listening-dot{width:10px;height:10px;background:var(--grn);border-radius:50%;display:inline-block;margin-right:8px;}
.active-mic .listening-dot{animation:pulse 1s infinite;box-shadow:0 0 10px var(--grn);}
@keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
</style>
</head>
<body>

<div class="app">
  <header>
    <div style="font-weight:700;">INTÉRPRETE LSC <span style="color:var(--acc)">PRO</span></div>
    <div id="status"><span class="listening-dot"></span><span id="stxt">Micrófono Apagado</span></div>
  </header>

  <div class="stage">
    <div class="display-area" id="mainDisplay">
      <div class="mtag" id="modeTag">SISTEMA LISTO</div>
      <div class="canvas-container">
        <svg id="svg" viewBox="0 0 300 360"></svg>
      </div>
      <div class="wlabel" id="wlabel">---</div>
    </div>

    <div class="ui-panel">
      <button id="btnStart" onclick="startRecognition()">Iniciar Micrófono</button>
      <button id="btnStop" onclick="stopRecognition()" style="display:none; background:#e05050">Detener</button>
      <button class="sec" onclick="toggleOverlay()">Vista Transparente OBS</button>
      
      <p style="font-size:11px; color:var(--mut); margin-top:15px">TRANSCRIPCIÓN</p>
      <div class="tbox" id="tbox"></div>
      
      <div style="font-size:10px; color:var(--mut); margin-top:auto">
        Modos: Legal, Religioso, Comunitario
      </div>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById('svg');
const wlabel = document.getElementById('wlabel');
const modeTag = document.getElementById('modeTag');
const mainDisplay = document.getElementById('mainDisplay');

/* DICCIONARIO AMPLIADO: LEGAL, RELIGIOSO Y COMÚN */
const POSES = {
    // RELIGIOSO
    'dios': () => avatarPose('happy', 150, 60, true, [0,1,0,0,0]),
    'jesus': () => avatarPose('happy', 150, 150, false, 'pray'),
    'iglesia': () => avatarPose('neutral', 150, 140, false, 'roof'),
    'amen': () => avatarPose('happy', 150, 180, false, 'pray'),
    
    // DERECHO / POLÍTICO
    'derecho': () => avatarPose('neutral', 200, 140, false, 'write'),
    'peticion': () => avatarPose('neutral', 180, 220, true, 'write'),
    'concejo': () => avatarPose('neutral', 150, 200, false, 'group'),
    'bucaramanga': () => avatarPose('happy', 220, 200, true, [0,1,1,0,0]), // Seña representativa
    'plenaria': () => avatarPose('neutral', 150, 210, true, 'group'),
    'ley': () => avatarPose('neutral', 200, 150, false, [0,1,1,1,1]),
    
    // COMÚN
    'casa': () => avatarPose('neutral', 150, 140, false, 'roof'),
    'hola': () => avatarPose('happy', 230, 95, true),
    'gracias': () => avatarPose('happy', 205, 148, false, [0,1,1,1,0]),
    'si': () => avatarPose('happy', 228, 215, true),
    'no': () => avatarPose('neutral', 228, 195, true, [0,1,0,0,0])
};

const ABC = {
    a:[0,0,0,0,0], b:[0,1,1,1,1], c:[1,1,1,1,1], d:[0,1,0,0,0], e:[0,0,0,0,0],
    f:[1,1,1,0,0], g:[0,1,0,0,0], h:[0,1,1,0,0], i:[0,0,0,0,1], j:[0,0,0,0,1],
    k:[1,1,1,0,0], l:[1,1,0,0,0], m:[0,0,0,0,0], n:[0,0,0,0,0], o:[1,1,1,1,1],
    p:[1,1,1,0,0], q:[0,1,0,0,0], r:[0,1,1,0,0], s:[0,0,0,0,0], t:[0,0,0,0,0],
    u:[0,1,1,0,0], v:[0,1,1,0,0], w:[0,1,1,1,0], x:[0,1,0,0,0], y:[1,0,0,0,1], z:[0,1,0,0,0]
};

function avatarPose(face, hx, hy, anim, fingers = 'open') {
    let handContent = '';
    if(fingers === 'pray') {
        handContent = `<path d="M140 180 L150 140 L160 180 Z" fill="var(--S)" stroke="var(--OT)"/>`;
    } else if (fingers === 'roof') {
        handContent = `<path d="M110 160 L150 120 L190 160" stroke="var(--S)" stroke-width="12" fill="none" stroke-linecap="round"/>`;
    } else if (fingers === 'write') {
        handContent = `<circle cx="${hx}" cy="${hy}" r="12" fill="var(--S)" stroke="var(--OT)"/><line x1="${hx}" y1="${hy}" x2="${hx+10}" y2="${hy-15}" stroke="var(--text)" stroke-width="2"/>`;
    } else if (fingers === 'group') {
        handContent = `<circle cx="130" cy="220" r="10" fill="var(--S)"/><circle cx="150" cy="220" r="10" fill="var(--S)"/><circle cx="170" cy="220" r="10" fill="var(--S)"/>`;
    } else if (Array.isArray(fingers)) {
        handContent = drawHand(hx, hy, fingers);
    } else {
        handContent = drawHand(hx, hy, [1,1,1,1,1]);
    }

    return `
        <g class="${anim ? 'anim-active' : ''}">
            <rect x="105" y="175" width="90" height="105" rx="12" fill="var(--SH)"/>
            <rect x="136" y="155" width="28" height="28" rx="6" fill="var(--S)"/>
            <ellipse cx="150" cy="120" rx="42" ry="46" fill="var(--S)" stroke="var(--OT)"/>
            <circle cx="135" cy="115" r="3" fill="#000"/><circle cx="165" cy="115" r="3" fill="#000"/>
            ${face === 'happy' ? `<path d="M138 140 Q150 150 162 140" stroke="var(--OT)" fill="none" stroke-width="2"/>` : `<line x1="140" y1="142" x2="160" y2="142" stroke="var(--OT)" stroke-width="2"/>`}
            <path d="M105 185 L70 250" stroke="var(--SH)" stroke-width="20" stroke-linecap="round"/>
            <path d="M195 185 L${hx} ${hy}" stroke="var(--SH)" stroke-width="20" stroke-linecap="round"/>
            ${handContent}
        </g>`;
}

function drawHand(cx, cy, f) {
    let res = `<ellipse cx="${cx}" cy="${cy}" rx="18" ry="14" fill="var(--S)" stroke="var(--OT)"/>`;
    const offsets = [{x:-15, y:-25}, {x:-5, y:-28}, {x:5, y:-28}, {x:15, y:-25}, {x:22, y:-15}];
    offsets.forEach((o, i) => { if(f[i]) res += `<rect x="${cx+o.x}" y="${cy+o.y}" width="9" height="20" rx="4" fill="var(--S)" stroke="var(--OT)"/>`; });
    return res;
}

let queue = [];
let isProcessing = false;

async function processQueue() {
    if (queue.length === 0) { isProcessing = false; return; }
    isProcessing = true;
    let word = queue.shift().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    
    // Soporte para frases compuestas como "derecho de peticion"
    if(word === "derecho" && queue[0] === "de" && queue[1] === "peticion") {
        word = "derecho de peticion";
        queue.shift(); queue.shift();
    }

    wlabel.textContent = word.toUpperCase();
    
    if (POSES[word] || POSES[word.split(' ')[0]]) {
        mainDisplay.className = "display-area mode-avatar";
        modeTag.textContent = "Seña Especializada";
        svg.innerHTML = POSES[word] ? POSES[word]() : POSES[word.split(' ')[0]]();
        await new Promise(r => setTimeout(r, 1300));
    } else {
        mainDisplay.className = "display-area mode-hand";
        modeTag.textContent = "Deletreando...";
        for (let char of word) {
            if (ABC[char]) {
                svg.innerHTML = drawHand(150, 200, ABC[char]);
                await new Promise(r => setTimeout(r, 450));
            }
        }
    }
    processQueue();
}

let recognition;
function startRecognition() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new Speech();
    recognition.lang = 'es-CO';
    recognition.continuous = true;
    recognition.onstart = () => {
        document.getElementById('status').className = 'active-mic';
        document.getElementById('stxt').textContent = 'Escuchando...';
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnStop').style.display = 'block';
    };
    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        const words = transcript.trim().split(' ');
        queue.push(...words);
        if (!isProcessing) processQueue();
        document.getElementById('tbox').innerHTML += `<span>${transcript} </span>`;
    };
    recognition.start();
}

function stopRecognition() {
    recognition.stop();
    document.getElementById('status').className = '';
    document.getElementById('stxt').textContent = 'Micrófono Apagado';
    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
}

function toggleOverlay() { document.body.classList.toggle('overlay'); }
svg.innerHTML = avatarPose('neutral', 70, 250, false, [0,0,0,0,0]);
</script>
</body>
</html>
